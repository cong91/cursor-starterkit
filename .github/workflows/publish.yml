name: publish

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package metadata
        run: |
          node -e "const pkg=require('./package.json'); if(pkg.private) { throw new Error('package.json private=true blocks publish'); } console.log(pkg.name, pkg.version)"

      - name: Test suite
        run: npm test

      - name: Smoke test
        run: npm run test:smoke

      - name: Verify publish files
        run: npm pack --dry-run

      - name: Create GitHub Release for tag push
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
